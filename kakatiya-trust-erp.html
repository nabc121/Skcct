<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#1a237e"/>
<title>Sri Kakatiya Cheyutha Charitable Trust ERP</title>
<style>
  :root{--navy:#1a237e;--red:#c62828;--gold:#f9a825;--green:#2e7d32;
    --sick:#b71c1c;--muted:#5c6bc0;--light:#f0f4ff;--orange:#e65100;--purple:#7b1fa2;--teal:#00695c;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,serif;background:var(--light);min-height:100vh;color:#111}
  button{cursor:pointer;font-family:inherit;border:none;transition:opacity .2s}
  button:hover{opacity:.85} select,input{font-family:inherit}
  input[type=checkbox]{accent-color:var(--sick)}
  #topbar{background:var(--navy);position:sticky;top:0;z-index:100;
    box-shadow:0 2px 12px rgba(26,35,126,.3);display:flex;align-items:center;
    padding:0 14px;height:56px;gap:8px}
  #topbar .brand{color:var(--gold);font-weight:800;font-size:12px;white-space:nowrap;flex-shrink:0}
  #nav-links{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap}
  .nav-btn{background:transparent;color:#b3c5ff;padding:5px 9px;border-radius:8px;font-weight:700;font-size:10px;white-space:nowrap}
  .nav-btn.active{background:var(--gold);color:#000}
  #hamburger{display:none;background:transparent;color:var(--gold);font-size:22px;padding:4px 8px;margin-left:auto}
  #mobile-menu{display:none;background:var(--navy);padding:10px 16px 14px;flex-direction:column;gap:4px;border-top:1px solid rgba(255,255,255,.1)}
  #mobile-menu .nav-btn{text-align:left;padding:10px 14px;font-size:13px}
  #content{max-width:1100px;margin:0 auto;padding:20px 14px}
  .card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(26,35,126,.08)}
  .stat-card{background:#fff;border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(26,35,126,.08)}
  .stat-val{font-size:24px;font-weight:800;font-family:Georgia,serif}
  .stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .hero{background:linear-gradient(135deg,var(--navy) 0%,#283593 60%,var(--red) 100%);border-radius:20px;padding:26px 22px;margin-bottom:20px;box-shadow:0 8px 32px rgba(26,35,126,.25)}
  .hero-logo{width:74px;height:74px;border-radius:50%;border:3px solid var(--gold);background:#fff;display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0}
  .feat-chip{background:rgba(255,255,255,.15);color:#fff;border-radius:20px;padding:4px 11px;font-size:10px;font-weight:600}
  .free-banner{background:linear-gradient(90deg,#1b5e20,#2e7d32);border-radius:12px;padding:12px 18px;color:#fff;display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:Georgia,serif;flex-shrink:0}
  .rank-badge{border-radius:4px;padding:2px 7px;font-size:10px;font-weight:800;margin-left:4px;color:#000}
  .sick-badge{background:var(--sick);color:#fff;border-radius:4px;padding:2px 6px;font-size:9px;font-weight:700;margin-left:4px}
  .free-badge{background:#1b5e20;color:#fff;border-radius:4px;padding:2px 6px;font-size:9px;font-weight:700;margin-left:4px}
  .student-row{background:#fff;border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;border:1.5px solid rgba(26,35,126,.12);box-shadow:0 2px 8px rgba(26,35,126,.05);transition:box-shadow .2s}
  .student-row:hover{box-shadow:0 4px 20px rgba(26,35,126,.15)}
  .student-row.sick-row{background:#fff5f5;border-color:rgba(183,28,28,.3)}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th{background:var(--navy);color:#fff;padding:8px 10px;text-align:left;font-size:10px}
  td{padding:7px 10px;border-bottom:1px solid rgba(26,35,126,.08)}
  tr:nth-child(even) td{background:#f8f9ff}
  .topper-card{background:linear-gradient(135deg,var(--light),#fff);border:2px solid var(--gold);border-radius:14px;padding:13px 16px;cursor:pointer;text-align:center;min-width:128px;position:relative;transition:transform .2s}
  .topper-card:hover{transform:translateY(-4px)}
  .id-card{background:linear-gradient(160deg,var(--navy) 0%,#283593 50%,var(--red) 100%);border-radius:16px;padding:17px;color:#fff;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(26,35,126,.3)}
  .filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .filter-bar select{padding:6px 11px;border-radius:8px;border:1.5px solid rgba(26,35,126,.25);font-size:11px;color:var(--navy);background:#fff}
  .filter-bar label{font-size:11px;color:var(--sick);font-weight:600;display:flex;align-items:center;gap:4px;cursor:pointer}
  .tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
  .tab-btn{padding:6px 14px;border-radius:8px;font-weight:700;font-size:11px;background:#eee;color:var(--navy)}
  .tab-btn.active{background:var(--navy);color:#fff}
  .sec-title{font-size:19px;font-weight:800;color:var(--navy);margin-bottom:12px;font-family:Georgia,serif}
  .sec-sub{font-size:12px;font-weight:800;color:var(--red);margin:10px 0 5px}
  .day-chip{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
  .day-chip.present{background:#e8f5e9;border:1.5px solid var(--green);color:var(--green)}
  .day-chip.absent{background:#ffebee;border:1.5px solid var(--sick);color:var(--sick)}
  .grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:13px}
  .grid-stat{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px;margin-bottom:20px}
  .member-chip{display:flex;align-items:center;gap:10px;background:var(--light);border-radius:12px;padding:10px 14px;border:1px solid rgba(26,35,126,.12)}
  .alert{border-radius:10px;padding:10px 13px;margin-bottom:14px;font-size:11px;font-weight:600}
  .alert-sick{background:#ffebee;border:2px solid var(--sick);color:var(--sick)}
  .alert-green{background:#e8f5e9;border:2px solid var(--green);color:var(--green)}
  .alert-orange{background:#fff3e0;border:2px solid var(--orange);color:var(--orange)}
  .alert-purple{background:#ede7f6;border:2px solid var(--purple);color:var(--purple)}
  .alert-teal{background:#e0f2f1;border:2px solid var(--teal);color:var(--teal)}
  .btn{padding:6px 14px;border-radius:8px;font-weight:700;font-size:11px;font-family:inherit}
  .btn-navy{background:var(--navy);color:#fff} .btn-red{background:var(--red);color:#fff}
  .btn-green{background:var(--green);color:#fff} .btn-gold{background:var(--gold);color:#000;font-weight:800}
  .btn-purple{background:var(--purple);color:#fff} .btn-ghost{background:#eee;color:var(--navy)}
  .btn-teal{background:var(--teal);color:#fff}
  #footer{text-align:center;padding:16px;color:var(--muted);font-size:10px;border-top:2px solid rgba(26,35,126,.1);margin-top:28px}
  .back-btn{padding:6px 14px;border-radius:8px;font-weight:700;font-size:11px;background:var(--light);color:var(--navy);margin-bottom:12px;display:inline-block}
  .mark-top{background:#e8f5e9;color:var(--green);border-radius:6px;padding:2px 7px;font-weight:700}
  .mark-low{background:#ffebee;color:var(--sick);border-radius:6px;padding:2px 7px;font-weight:700}
  .mark-avg{background:#fff9e6;color:var(--orange);border-radius:6px;padding:2px 7px;font-weight:700}
  .donor-card{border:1.5px solid var(--gold);border-radius:16px;padding:18px}
  .dashed-add{border:2px dashed rgba(26,35,126,.3);border-radius:16px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;text-align:center}
  .health-chip{display:inline-block;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700}
  .exam-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--light);border-radius:10px;margin-bottom:7px;flex-wrap:wrap;gap:6px}
  .timetable-cell{background:#fff;border:1.5px solid rgba(26,35,126,.15);border-radius:8px;padding:8px 10px;text-align:center;font-size:10px;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .timetable-cell.header{background:var(--navy);color:#fff;font-weight:700;font-size:10px;min-height:36px}
  @media(max-width:640px){
    #nav-links{display:none} #hamburger{display:block}
    #topbar .brand{font-size:10px} .hero{padding:18px 14px}
    table{font-size:9px} th,td{padding:5px 6px} .grid-2{grid-template-columns:1fr}
  }
</style>
</head>

   health:{bloodGroup:"B+",allergies:"None",conditions:"Stomach pain",lastCheckup:"2026-05-22",weight:"28kg",height:"132cm",vision:"Normal",vaccinations:"Up to date"}},

let rankFilter="All",selectedStudent=null,studentTab="overview",studentView="list";
let healthFilter="All",examTab="schedule";

// ── HELPERS
function initials(n){return n.split(" ").map(w=>w[0]).join("").slice(0,2)}
function avatar(n,size=44,bg="#1a237e"){
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:linear-gradient(135deg,${bg},#f9a825);font-size:${size*.36}px">${initials(n)}</div>`;}
function rankBadge(r){const c={1:"#FFD700",2:"#C0C0C0",3:"#CD7F32"};return c[r]?`<span class="rank-badge" style="background:${c[r]}">#${r}</span>`:""}
function sickBadge(){return`<span class="sick-badge">🤒 SICK</span>`}
function freeBadge(){return`<span class="free-badge">🎓 FREE</span>`}
function medalEmoji(i){return i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}
function markClass(m){return m>=90?"mark-top":m<60?"mark-low":"mark-avg"}
function statCard(label,value,icon,color){
  return`<div class="stat-card" style="border-left:5px solid ${color}"><span style="font-size:26px">${icon}</span><div><div class="stat-val" style="color:${color}">${value}</div><div class="stat-lbl">${label}</div></div></div>`;}

function render(){
  document.getElementById("content").innerHTML=pages[currentPage]();
  document.querySelectorAll(".nav-btn").forEach(b=>{
    const id=b.textContent.trim().toLowerCase();
    b.classList.toggle("active",id.includes(currentPage==="home"?"home":currentPage));});
}
function showPage(p){currentPage=p;selectedStudent=null;studentTab="overview";render();window.scrollTo(0,0);}
function toggleMenu(){const m=document.getElementById("mobile-menu");m.style.display=m.style.display==="flex"?"none":"flex";}

              <span style="background:#e8f5e9;color:var(--green);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700">✓ Done</span>
              <button class="btn btn-green" style="font-size:10px">📊 View Results</button>
            </div>
          </div>`).join("")}
      </div>
    `:""}
    ${examTab==="timetable"?`
      <div class="card">
        <div style="font-size:13px;font-weight:800;color:var(--navy);margin-bottom:13px">🗓️ Weekly Timetable — Class 10th</div>
        <div style="overflow-x:auto">
          <div style="display:grid;grid-template-columns:80px repeat(6,1fr);gap:5px;min-width:520px">
            <div class="timetable-cell header">Period</div>
            ${SUBJECTS.map(s=>`<div class="timetable-cell header">${s}</div>`).join("")}
            ${days.map(day=>`
              <div class="timetable-cell header">${day}</div>
              ${tt[day].map(subj=>{
                const colors={"Telugu":"#e3f2fd","Hindi":"#fce4ec","English":"#e8f5e9","Maths":"#fff3e0","Science":"#f3e5f5","Social":"#fff8e1"};
                return`<div class="timetable-cell" style="background:${colors[subj]||"#fff"}"><span style="font-size:9px;font-weight:700;color:var(--navy)">${subj}</span></div>`}).join("")}`).join("")}
          </div>
        </div>
        <div style="display:flex;gap:5px;margin-top:11px;flex-wrap:wrap">
          ${["5th","6th","7th","8th","9th","10th"].map(c=>`<button class="btn btn-ghost" style="font-size:10px" onclick="alert('Timetable for class ${c}')">${c}</button>`).join("")}
        </div>
      </div>
    `:""}
    ${examTab==="results"?`
      <div class="card" style="overflow-x:auto">
        <div style="font-size:13px;font-weight:800;color:var(--navy);margin-bottom:13px">📊 Term 1 Exam Results</div>
        <table>
          <thead><tr><th>Student</th><th>Class</th><th>Telugu</th><th>Hindi</th><th>English</th><th>Maths</th><th>Science</th><th>Social</th><th>Total</th></tr></thead>
          <tbody>
            ${STUDENTS.map(s=>{
              const subMarks=SUBJECTS.map(()=>Math.floor(40+Math.random()*60));
              const total=Math.round(subMarks.reduce((a,b)=>a+b,0)/SUBJECTS.length);
              return`<tr>
                <td style="font-weight:600;color:var(--navy)">${s.name}${s.sick?sickBadge():""}</td>
                <td>${s.cls}</td>
                ${subMarks.map(m=>`<td><span class="${markClass(m)}">${m}</span></td>`).join("")}
                <td><strong>${total}%</strong></td>
              </tr>`;}).join("")}
          </tbody>
        </table>
      </div>
    `:""}`;
},

cctv:()=>`
  <div class="sec-title">📹 CCTV Parent Access</div>
  <div class="alert alert-purple">🔒 Each parent gets access to ONE camera only, covering their child's area. Approved by Admin.</div>
  <div class="grid-2">
    ${STUDENTS.slice(0,6).map(s=>`
      <div class="card">
        <div style="display:flex;gap:9px;align-items:center;margin-bottom:11px">
          ${avatar(s.name,38)}
          <div><div style="font-weight:700;color:var(--navy)">${s.name}</div><div style="font-size:10px;color:var(--muted)">${s.hostel}</div></div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:7px">Camera: <strong style="color:var(--navy)">CAM-${s.hostel.split(" ")[0].toUpperCase()}-01</strong></div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:9px">
          <div style="width:7px;height:7px;border-radius:50%;background:var(--green)"></div>
          <span style="font-size:10px;color:var(--green);font-weight:600">Live · Parent Access Enabled</span>
        </div>
        <button class="btn btn-purple" style="width:100%;font-size:11px">🎥 View Parent Feed</button>
      </div>`).join("")}

};

function studentProfile(){
  const s=selectedStudent;
  const tabs=["overview","attendance","health","id-card","reports"];
  const tabHtml=tabs.map(t=>`<button class="tab-btn ${studentTab===t?"active":""}" onclick="setStudentTab('${t}')">${t.replace("-"," ")}</button>`).join("");
  let body="";
  if(studentTab==="overview"){
    body=`<div class="grid-2">
      ${[
        {l:"School",v:s.school,i:"🏫"},{l:"Hostel",v:s.hostel,i:"🏠"},
        {l:"Parent Email",v:s.email,i:"📧"},{l:"Donor",v:s.donor||"Not adopted yet",i:"💝"},
        {l:"Current Marks",v:s.marks+"%",i:"📊"},{l:"Health Status",v:s.health.conditions,i:s.sick?"🤒":"✅"},
        {l:"Blood Group",v:s.health.bloodGroup,i:"🩸"},{l:"Education",v:"FREE — Trust Supported",i:"🎓"},
      ].map(x=>`<div class="card"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">${x.i} ${x.l}</div><div style="font-weight:700;color:var(--navy);font-size:12px">${x.v}</div></div>`).join("")}
    </div>`;
  } else if(studentTab==="attendance"){
    body=`<div class="card">
      ${s.sick?`<div class="alert alert-sick">🤒 Student is currently on Sick Leave — ${s.health.conditions}. Parents notified via email.</div>`:""}
      <div style="font-size:14px;font-weight:800;color:var(--navy);margin-bottom:12px">Weekly Attendance</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        ${WEEK.map((d,i)=>`
          <div style="text-align:center;background:${s.week[i]?"#e8f5e9":"#ffebee"};border-radius:10px;padding:9px 12px;min-width:46px;border:2px solid ${s.week[i]?"var(--green)":"var(--sick)"}">
            <div style="font-weight:700;font-size:11px;color:${s.week[i]?"var(--green)":"var(--sick)"}">${d}</div>
            <div style="font-size:15px;margin-top:2px">${s.week[i]?"✅":"❌"}</div>
          </div>`).join("")}
      </div>
      <div style="margin-top:12px;font-size:12px;color:var(--muted)">Overall Attendance: <strong style="color:var(--navy)">${s.att}%</strong></div>
    </div>`;
  } else if(studentTab==="health"){
    body=`<div class="card">
      ${s.sick?`<div class="alert alert-sick">🤒 Currently Sick: ${s.health.conditions}</div>`:""}
      <div style="font-size:14px;font-weight:800;color:var(--navy);margin-bottom:12px">🏥 Health Record</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px">
        ${[
          {l:"Blood Group",v:s.health.bloodGroup,c:"var(--teal)"},
          {l:"Weight",v:s.health.weight,c:"var(--navy)"},
          {l:"Height",v:s.health.height,c:"var(--navy)"},
          {l:"Vision",v:s.health.vision,c:"var(--navy)"},
          {l:"Allergies",v:s.health.allergies,c:s.health.allergies!=="None"?"var(--orange)":"var(--green)"},
          {l:"Vaccinations",v:s.health.vaccinations,c:s.health.vaccinations.includes("Pending")?"var(--sick)":"var(--green)"},
          {l:"Condition",v:s.health.conditions,c:s.sick?"var(--sick)":"var(--green)"},
          {l:"Last Checkup",v:s.health.lastCheckup,c:"var(--muted)"},
        ].map(x=>`<div style="background:var(--light);border-radius:8px;padding:9px 11px"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">${x.l}</div><div style="font-weight:700;color:${x.c};font-size:12px;margin-top:3px">${x.v}</div></div>`).join("")}
      </div>
      <div style="display:flex;gap:6px;margin-top:12px">
        <button class="btn btn-teal" style="font-size:10px">📋 Full History</button>
        <button class="btn btn-navy" style="font-size:10px">📧 Email Parent</button>
        ${s.sick?`<button class="btn btn-red" style="font-size:10px">🚨 Emergency Alert</button>`:""}
      </div>
    </div>`;
  } else if(studentTab==="id-card"){
    body=`<div style="max-width:270px">${idCardHTML(s)}<button class="btn btn-green" style="width:100%;margin-top:9px">⬇️ Download ID Card</button></div>`;
  } else {
    body=`<div class="card">
      <div style="font-size:14px;font-weight:800;color:var(--navy);margin-bottom:12px">📊 Academic Reports</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        ${["Term 1 Report","Term 2 Report","Mid-Year Progress","Annual Report"].map(r=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 13px;background:var(--light);border-radius:10px;flex-wrap:wrap;gap:5px">
            <span style="font-weight:600;color:var(--navy);font-size:12px">📄 ${r}</span>
            <div style="display:flex;gap:5px">
              <button class="btn btn-navy" style="font-size:10px">View</button>
              <button class="btn btn-green" style="font-size:10px">📧 Email Parent</button>
            </div>
          </div>`).join("")}
      </div>
    </div>`;
  }
  return`
    <button class="btn back-btn" onclick="closeStudent()">← Back</button>
    <div style="background:linear-gradient(135deg,var(--navy),var(--red));border-radius:18px;padding:20px;color:#fff;margin-bottom:16px;display:flex;gap:14px;align-items:center;flex-wrap:wrap">
      ${avatar(s.name,62,"#c62828")}
      <div style="flex:1">
        <div style="font-size:19px;font-weight:800;font-family:Georgia,serif">${s.name}${s.sick?sickBadge():""}${freeBadge()}</div>
        <div style="color:#b3c5ff;font-size:11px;margin-top:3px">ID: SKT-${String(s.id).padStart(4,"0")} · ${s.cls} Class · ${s.school}</div>
        <div style="display:flex;gap:7px;margin-top:8px;flex-wrap:wrap">
          <span style="background:var(--gold);color:#000;border-radius:20px;padding:2px 11px;font-size:10px;font-weight:800">Rank #${s.rank}</span>
          <span style="background:rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:2px 11px;font-size:10px">${s.marks}% Marks</span>
          <span style="background:rgba(255,255,255,.2);color:#fff;border-radius:20px;padding:2px 11px;font-size:10px">${s.att}% Att.</span>
          <span style="background:#1b5e20;color:#fff;border-radius:20px;padding:2px 11px;font-size:10px;font-weight:700">🎓 FREE</span>
        </div>
      </div>
    </div>
    <div class="tabs">${tabHtml}</div>${body}`;
}

function idCardHTML(s){
  return`<div class="id-card">
    <div style="position:absolute;top:-16px;right:-16px;width:65px;height:65px;border-radius:50%;background:rgba(255,215,0,.12)"></div>
    <div style="font-size:7px;font-weight:800;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:7px">Sri Kakatiya Cheyutha Charitable Trust</div>
    <div style="font-size:7px;color:#b3c5ff;margin-bottom:7px">🎓 FREE Education for All Children</div>
    <div style="display:flex;gap:9px;align-items:center;margin-bottom:9px">
      ${avatar(s.name,44,"#c62828")}
      <div>
        <div style="font-weight:800;font-size:12px">${s.name}</div>
        <div style="font-size:9px;color:#b3c5ff">ID: SKT-${String(s.id).padStart(4,"0")}</div>
        ${s.rank<=3?`<div style="font-size:14px">${s.rank===1?"🥇":s.rank===2?"🥈":"🥉"}</div>`:""}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:9px">
      <div><span style="color:var(--gold)">Class:</span> ${s.cls}</div>
      <div><span style="color:var(--gold)">Rank:</span> #${s.rank}</div>
      <div><span style="color:var(--gold)">Blood:</span> ${s.health.bloodGroup}</div>
      <div><span style="color:var(--gold)">Att:</span> ${s.att}%</div>
      <div style="grid-column:1/-1"><span style="color:var(--gold)">School:</span> ${s.school}</div>
      <div style="grid-column:1/-1"><span style="color:var(--gold)">Hostel:</span> ${s.hostel}</div>
      ${s.donor?`<div style="grid-column:1/-1"><span style="color:var(--gold)">Donor:</span> 💝 ${s.donor}</div>`:""}
    </div>
    <div style="margin-top:9px;border-top:1px solid rgba(255,255,255,.2);padding-top:6px;display:flex;justify-content:space-between;font-size:8px;color:#b3c5ff">
      <span>Nizamabad, Telangana</span><span>2025–26</span>
    </div>
  </div>`;}

function openStudent(id){selectedStudent=STUDENTS.find(s=>s.id===id);studentTab="overview";render();window.scrollTo(0,0);}
function closeStudent(){selectedStudent=null;render();}
function setStudentTab(t){studentTab=t;render();}
function setStudentView(v){studentView=v;render();}
function setSF(k,v){studentFilter[k]=v;render();}
function setRank(v){rankFilter=v;render();}
function setHealth(v){healthFilter=v;render();}
function setExamTab(t){examTab=t;render();}

render();
</script>
</body>
</html>
